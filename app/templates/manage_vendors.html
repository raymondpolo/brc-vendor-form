{% extends "layout.html" %}
{% block content %}
<div class="space-y-8">
    <div class="bg-white p-6 rounded-lg shadow-md" x-data="vendorManager()">
        <h3 class="text-lg font-semibold text-gray-700 mb-4">Manage Vendors</h3>
        
        <div class="mb-8 border-b pb-6">
            </div>

        <h4 class="text-md font-medium text-gray-600 mb-2">Existing Vendors</h4>
        <div class="mb-4">
            <input type="text" x-model="search" placeholder="Filter by name, specialty, contact..."
                   class="w-full md:w-1/2 lg:w-1/3 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>

        <table class="w-full text-sm text-left text-gray-500 responsive-table">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 hidden md:table-header-group">
                <tr>
                    <th scope="col" class="px-6 py-3">Company Name</th>
                    <th scope="col" class="px-6 py-3">Contact</th>
                    <th scope="col" class="px-6 py-3">Email</th>
                    <th scope="col" class="px-6 py-3">Phone</th>
                    <th scope="col" class="px-6 py-3">Specialty</th>
                    <th scope="col" class="px-6 py-3">Website</th>
                    <th scope="col" class="px-6 py-3">Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="vendor in filteredVendors" :key="vendor.id">
                    <tr class="block md:table-row border-b md:border-b-0 mb-4 md:mb-0 bg-white rounded-lg shadow-md md:shadow-none">
                        <td data-label="Company" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="vendor.company_name"></td>
                        <td data-label="Contact" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="vendor.contact_name || 'N/A'"></td>
                        <td data-label="Email" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="vendor.email || 'N/A'"></td>
                        <td data-label="Phone" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="vendor.phone || 'N/A'"></td>
                        <td data-label="Specialty" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="vendor.specialty || 'N/A'"></td>
                        <td data-label="Website" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0">
                            <template x-if="vendor.website"><a :href="vendor.website" target="_blank" class="text-indigo-600 hover:underline">Visit</a></template>
                            <template x-if="!vendor.website"><span class="text-gray-500">N/A</span></template>
                        </td>
                        <td data-label="Actions" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left">
                            <div class="flex items-center justify-end md:justify-start space-x-4">
                                <a :href="`/admin/edit_vendor/${vendor.id}`" class="font-medium text-indigo-600 hover:text-indigo-900">Edit</a>
                                {% if current_user.role == 'Super User' %}
                                <form :action="`/admin/delete_vendor/${vendor.id}`" method="POST" onsubmit="return confirm('Are you sure?');">
                                    <button type="submit" class="font-medium text-red-600 hover:text-red-900">Delete</button>
                                </form>
                                {% endif %}
                            </div>
                        </td>
                    </tr>
                </template>
                <tr x-show="filteredVendors.length === 0">
                    <td colspan="7" class="px-6 py-4 text-center text-gray-500">
                        No vendors found matching your search.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function vendorManager() {
        return {
            search: '',
            vendors: {{ vendors_json|safe }},
            get filteredVendors() {
                if (this.search === '') {
                    return this.vendors;
                }
                const searchLower = this.search.toLowerCase();
                return this.vendors.filter(v =>
                    v.company_name.toLowerCase().includes(searchLower) ||
                    (v.contact_name && v.contact_name.toLowerCase().includes(searchLower)) ||
                    (v.specialty && v.specialty.toLowerCase().includes(searchLower))
                );
            }
        }
    }
</script>
{% endblock content %}
