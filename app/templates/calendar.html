{% extends "layout.html" %}
{% block content %}
<div class="bg-white p-2 sm:p-6 rounded-lg shadow-md">
    <div id="calendar"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet" />
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        // Check if the viewport is mobile-sized
        var isMobile = window.innerWidth < 768;

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',

            // CORRECTED: Use a different, mobile-friendly toolbar layout on small screens.
            // On mobile, the header is simplified, and view-switching buttons are moved to the footer.
            headerToolbar: isMobile ? {
                left: 'prev,next',
                center: 'title',
                right: 'today'
            } : {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            footerToolbar: isMobile ? {
                center: 'dayGridMonth,timeGridWeek,timeGridDay'
            } : {},

            // Shows a "+more" link when events overflow the cell, improving clarity.
            dayMaxEvents: true,

            events: '/api/events'
        });
        calendar.render();
    });
</script>
{% endblock content %}
