{% extends "layout.html" %}
{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md" x-data="requestManager()">
    
    <h3 class="text-lg font-semibold text-gray-700 mb-4">All Work Requests</h3>

    <div class="mb-4">
        <input type="text" x-model="search" placeholder="Search across all columns..."
               class="w-full md:w-1/2 lg:w-1/3 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
    </div>

    <table class="w-full text-sm text-left text-gray-500 responsive-table">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 hidden md:table-header-group">
            <tr>
                <th scope="col" class="px-6 py-3">Request ID</th>
                <th scope="col" class="px-6 py-3">Date Submitted</th>
                <th scope="col" class="px-6 py-3">WO#</th>
                <th scope="col" class="px-6 py-3">Requester</th>
                <th scope="col" class="px-6 py-3">Property</th>
                <th scope="col" class="px-6 py-3">Unit #</th>
                <th scope="col" class="px-6 py-3">Property Manager</th>
                <th scope="col" class="px-6 py-3">Request Type</th>
                <th scope="col" class="px-6 py-3">Assigned Vendor</th>
                <th scope="col" class="px-6 py-3">Status</th>
                <th scope="col" class="px-6 py-3">Tags</th>
            </tr>
        </thead>
        <tbody>
            <template x-for="req in filteredRequests" :key="req.id">
                <tr class="block md:table-row border-b md:border-b-0 mb-4 md:mb-0 bg-white rounded-lg shadow-md md:shadow-none">
                    <td data-label="Request ID" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0">
                        <a :href="'/request/' + req.id" class="font-medium text-indigo-600 hover:underline" x-text="'#' + req.id"></a>
                    </td>
                    <td data-label="Date Submitted" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.date_created"></td>
                    <td data-label="WO#" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.wo_number || 'N/A'"></td>
                    <td data-label="Requester" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.requester_name"></td>
                    <td data-label="Property" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.property"></td>
                    <td data-label="Unit #" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.unit"></td>
                    <td data-label="Property Manager" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.property_manager"></td>
                    <td data-label="Request Type" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.request_type"></td>
                    <td data-label="Assigned Vendor" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="req.vendor_name"></td>
                    <td data-label="Status" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                              :class="{
                                  'bg-blue-100 text-blue-800': ['New', 'Open'].includes(req.status),
                                  'bg-green-100 text-green-800': ['Completed', 'Approved'].includes(req.status),
                                  'bg-red-100 text-red-800': ['Cancelled', 'Quote Declined'].includes(req.status),
                                  'bg-yellow-100 text-yellow-800': !['New', 'Open', 'Completed', 'Approved', 'Cancelled', 'Quote Declined'].includes(req.status)
                              }"
                              x-text="req.status">
                        </span>
                    </td>
                    <td data-label="Tags" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left">
                        <div class="flex flex-col space-y-1 items-end md:items-start">
                            <template x-if="req.tag">
                                <template x-for="t in req.tag.split(',').filter(Boolean)" :key="t">
                                     <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="{
                                              'bg-green-100 text-green-800': ['Approved', 'Completed'].includes(t),
                                              'bg-red-100 text-red-800': ['Declined'].includes(t),
                                              'bg-blue-100 text-blue-800': ['Go-back'].includes(t),
                                              'bg-purple-100 text-purple-800': !['Approved', 'Completed', 'Declined', 'Go-back'].includes(t)
                                          }"
                                          x-text="t">
                                    </span>
                                </template>
                            </template>
                            <template x-if="!req.tag">
                                <span>N/A</span>
                            </template>
                        </div>
                    </td>
                </tr>
            </template>
            <tr x-show="filteredRequests.length === 0">
                <td colspan="11" class="px-6 py-4 text-center text-gray-500">
                    No requests found matching your search.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function requestManager() {
        return {
            search: '',
            requests: {{ requests_json|safe }},
            sortColumn: 'id',
            sortDirection: 'desc',
            sortBy(column) {
                if (window.innerWidth < 768) return;
                if (this.sortColumn === column) {
                    this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    this.sortColumn = column;
                    this.sortDirection = 'asc';
                }
            },
            get filteredRequests() {
                const filtered = this.requests.filter(req => {
                    const searchLower = this.search.toLowerCase();
                    return Object.values(req).some(val => 
                        String(val).toLowerCase().includes(searchLower)
                    );
                });

                if (this.sortColumn && window.innerWidth >= 768) {
                    filtered.sort((a, b) => {
                        let valA = a[this.sortColumn];
                        let valB = b[this.sortColumn];

                        if (this.sortColumn === 'id') {
                            valA = parseInt(valA, 10);
                            valB = parseInt(valB, 10);
                        } else if (typeof valA === 'string') {
                            valA = (valA || '').toLowerCase();
                            valB = (valB || '').toLowerCase();
                        }
                        
                        if (valA < valB) return this.sortDirection === 'asc' ? -1 : 1;
                        if (valA > valB) return this.sortDirection === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return filtered;
            }
        }
    }
</script>
{% endblock content %}
