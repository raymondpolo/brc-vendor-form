<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; color: #333; line-height: 1.6; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 5px; max-width: 600px; margin: auto; }
        .content { white-space: pre-wrap; font-family: monospace; background-color: #f7f7f7; padding: 15px; border-radius: 4px; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
{{ body }}
        </div>
        <div class="footer">
            <p>
                <strong>Work Order Details:</strong><br>
                ID: #{{ work_order.id }}<br>
                Property: {{ work_order.property }}<br>
                Unit: {{ work_order.unit or 'N/A' }}<br>
                Address: {{ work_order.address }}
            </p>
        </div>
    </div>
</body>
</html>
