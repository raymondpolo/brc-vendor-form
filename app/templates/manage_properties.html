{% extends "layout.html" %}
{% block content %}
<div class="space-y-8">
    <div class="bg-white p-6 rounded-lg shadow-md" x-data="propertyManager()">
        <h3 class="text-lg font-semibold text-gray-700 mb-4">Manage Properties</h3>
        
        <div class="mb-8 border-b pb-6">
            </div>

        <h4 class="text-md font-medium text-gray-600 mb-2">Existing Properties</h4>
        <div class="mb-4">
            <input type="text" x-model="search" placeholder="Filter by property name or address..."
                   class="w-full md:w-1/2 lg:w-1/3 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>

        <table class="w-full text-sm text-left text-gray-500 responsive-table">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 hidden md:table-header-group">
                <tr>
                    <th scope="col" class="px-6 py-3">Property Name</th>
                    <th scope="col" class="px-6 py-3">Address</th>
                    <th scope="col" class="px-6 py-3">Property Manager</th>
                    <th scope="col" class="px-6 py-3">Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="prop in filteredProperties" :key="prop.id">
                    <tr class="block md:table-row border-b md:border-b-0 mb-4 md:mb-0 bg-white rounded-lg shadow-md md:shadow-none">
                        <td data-label="Property Name" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="prop.name"></td>
                        <td data-label="Address" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="prop.address"></td>
                        <td data-label="Property Manager" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left border-b md:border-b-0" x-text="prop.property_manager || 'N/A'"></td>
                        <td data-label="Actions" class="block md:table-cell px-6 py-3 md:py-4 text-right md:text-left">
                            <div class="flex items-center justify-end md:justify-start space-x-4">
                                <a :href="`/admin/edit_property/${prop.id}`" class="font-medium text-indigo-600 hover:text-indigo-900">Edit</a>
                                {% if current_user.role == 'Super User' %}
                                <form :action="`/admin/delete_property/${prop.id}`" method="POST" onsubmit="return confirm('Are you sure?');">
                                    <button type="submit" class="font-medium text-red-600 hover:text-red-900">Delete</button>
                                </form>
                                {% endif %}
                            </div>
                        </td>
                    </tr>
                </template>
                <tr x-show="filteredProperties.length === 0">
                    <td colspan="4" class="px-6 py-4 text-center text-gray-500">
                        No properties found matching your search.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function propertyManager() {
        return {
            search: '',
            properties: {{ properties_json|safe }},
            get filteredProperties() {
                if (this.search === '') {
                    return this.properties;
                }
                const searchLower = this.search.toLowerCase();
                return this.properties.filter(p => 
                    p.name.toLowerCase().includes(searchLower) ||
                    p.address.toLowerCase().includes(searchLower)
                );
            }
        }
    }
</script>
{% endblock content %}
